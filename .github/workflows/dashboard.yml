name: Refresh Dashboard

on:
  # Run after trading bot completes
  workflow_run:
    workflows: ["Trading Bot"]
    types: [completed]
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  pages: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests cryptography

      - name: Fetch activities and calculate P&L
        env:
          PM_API_KEY: ${{ secrets.PM_API_KEY }}
          PM_API_SECRET: ${{ secrets.PM_API_SECRET }}
        run: python refresh_dashboard.py

      - name: Deploy to GitHub Pages
        run: |
          # Save built file to tmp
          cp dashboard.html /tmp/index.html

          # Clone gh-pages into a separate directory
          git clone --branch gh-pages --single-branch --depth 1 \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" \
            /tmp/gh-pages 2>/dev/null || mkdir -p /tmp/gh-pages

          cd /tmp/gh-pages
          git config user.name "dashboard-bot"
          git config user.email "bot@polymarket-bot.local"

          # Update Polymarket dashboard, keep Kalshi kalshi.html if it exists
          cp /tmp/index.html index.html
          git init 2>/dev/null || true
          git add index.html
          git add kalshi.html 2>/dev/null || true
          git diff --staged --quiet || git commit -m "dashboard: refresh $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin gh-pages --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
