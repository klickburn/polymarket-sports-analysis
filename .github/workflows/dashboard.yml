name: Refresh Dashboard

on:
  # Run after trading bot completes
  workflow_run:
    workflows: ["Trading Bot"]
    types: [completed]
  # Run at :15 and :45 (offset from bot at :00 and :30)
  schedule:
    - cron: '15 * * * *'
    - cron: '45 * * * *'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  pages: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests cryptography

      - name: Fetch activities and calculate P&L
        env:
          PM_API_KEY: ${{ secrets.PM_API_KEY }}
          PM_API_SECRET: ${{ secrets.PM_API_SECRET }}
        run: python refresh_dashboard.py

      - name: Deploy to GitHub Pages
        run: |
          git config user.name "dashboard-bot"
          git config user.email "bot@polymarket-bot.local"

          # Create gh-pages branch if it doesn't exist
          git checkout --orphan gh-pages 2>/dev/null || git checkout gh-pages

          # Keep only the dashboard file
          git rm -rf --cached . || true
          cp dashboard.html index.html

          git add index.html
          git diff --staged --quiet || git commit -m "dashboard: refresh $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin gh-pages --force
