name: Trading Bot

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  scan-and-bet:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests cryptography

      - name: Run trading bot (live)
        env:
          PM_API_KEY: ${{ secrets.PM_API_KEY }}
          PM_API_SECRET: ${{ secrets.PM_API_SECRET }}
        run: python trading_bot.py --live

      - name: Commit bot bets data
        run: |
          git config user.name "trading-bot"
          git config user.email "bot@polymarket-bot.local"
          git add trading_bot_bets.json trading_bot.log bot_status.json || true
          git diff --staged --quiet || git commit -m "bot: update bets $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push || true
