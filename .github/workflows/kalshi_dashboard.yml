name: Kalshi Dashboard

on:
  # Run after Kalshi bot completes
  workflow_run:
    workflows: ["Kalshi Bot"]
    types: [completed]
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  pages: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests cryptography

      - name: Build Kalshi dashboard
        env:
          KALSHI_KEY_ID: ${{ secrets.KALSHI_KEY_ID }}
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
        run: python refresh_kalshi_dashboard.py

      - name: Deploy to GitHub Pages
        run: |
          git config user.name "kalshi-dashboard-bot"
          git config user.email "bot@kalshi-bot.local"

          # Save built file to tmp
          cp kalshi_dashboard.html /tmp/kalshi.html

          # Clone gh-pages into a separate directory
          git clone --branch gh-pages --single-branch --depth 1 \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" \
            /tmp/gh-pages 2>/dev/null || mkdir -p /tmp/gh-pages

          cd /tmp/gh-pages
          git config user.name "kalshi-dashboard-bot"
          git config user.email "bot@kalshi-bot.local"

          # Update Kalshi dashboard, keep Polymarket index.html if it exists
          cp /tmp/kalshi.html kalshi.html
          git init 2>/dev/null || true
          git add kalshi.html
          git add index.html 2>/dev/null || true
          git diff --staged --quiet || git commit -m "dashboard: refresh $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin gh-pages --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
